name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            set -e
            
            # 1. Navigate to the project directory
            cd /home/ubuntu/TreeViewApp-Backend
            
            # 2. Pull the latest changes from the main branch
            git pull origin main
            
            # 3. Update dependencies within the virtual environment
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 4. Restart the PM2 process (or start it if it's not running)
            pm2 restart python || pm2 start "uvicorn main:app --host 0.0.0.0 --port 8000" --name python
            
            # 5. Save the PM2 list so it persists after server reboots
            pm2 save